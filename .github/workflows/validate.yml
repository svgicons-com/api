name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run check:secrets
      - run: npm run check:docs
      - run: npm run validate:scaffold
      - run: npm run validate:openapi
      - run: git diff --check
