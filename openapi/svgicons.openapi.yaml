openapi: "3.1.0"
info:
  title: "Svg/icons Pro API"
  summary: "Authenticated Pro API for icon search, icon reads, Icon Collections, exports, and PNG rendering."
  version: "2026-05-10"
  description: "The Svg/icons Pro API uses scoped Sanctum personal access tokens created from a Pro account. Public browsing and website search remain available outside this API.\n\nThis YAML file is the public API-repo version of the website source OpenAPI file at `public/openapi/pro-api.json`. It documents the live `/api/pro` REST API only."
servers:
  -
    url: "https://svgicons.com"
    description: "Production"
tags:
  -
    name: "Auth / Account"
    description: "Scope discovery and authenticated token/account inspection."
  -
    name: "Search"
    description: "Authenticated icon metadata search."
  -
    name: "Icons"
    description: "Icon metadata, SVG payloads, and single-icon PNG export."
  -
    name: "Project Kits"
    description: "Icon Collection workflows. The current REST path uses the historical project-kits segment."
  -
    name: "Exports"
    description: "Queued Icon Collection ZIP exports."
x-pro-api-scopes:
  - "search:read"
  - "icons:read"
  - "collections:read"
  - "collections:write"
  - "exports:create"
  - "mcp:use"
paths:
  "/api/pro/scopes":
    get:
      tags:
        - "Auth / Account"
      summary: "List Pro API token scopes"
      operationId: "listProApiScopes"
      security: []
      responses:
        "200":
          description: "Scope catalog."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/ScopeListResponse"
              examples:
                scopes:
                  value:
                    data:
                      -
                        value: "search:read"
                        label: "Search"
                        description: "Search icons and icon sets through Pro API clients."
      description: "Returns the current Pro API scope catalog. This public endpoint is useful before creating a token or configuring an integration."
  "/api/pro/me":
    get:
      tags:
        - "Auth / Account"
      summary: "Inspect the current Pro API token"
      operationId: "getProApiMe"
      security:
        -
          bearerAuth: []
      responses:
        "200":
          description: "Current user, access summary, token metadata, and available scopes."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/MeResponse"
        "401":
          "$ref": "#/components/responses/Unauthenticated"
      description: "Returns the authenticated user, account access summary, current token metadata, and scope catalog for the bearer token."
  "/api/pro/search":
    get:
      tags:
        - "Search"
      summary: "Search public icon metadata"
      operationId: "searchProIcons"
      security:
        -
          bearerAuth: []
      x-required-scopes:
        - "search:read"
      parameters:
        -
          name: "q"
          in: "query"
          description: "Search query. Takes precedence over query when both are supplied."
          schema:
            type: "string"
            maxLength: 100
            example: "arrow left"
        -
          name: "query"
          in: "query"
          description: "Alternative search query parameter."
          schema:
            type: "string"
            maxLength: 100
        -
          name: "category"
          in: "query"
          description: "Optional icon set category filter. New means icon sets created in the last three months."
          schema:
            type: "string"
            maxLength: 80
            example: "Interface"
        -
          name: "iconSetPrefix"
          in: "query"
          description: "Optional icon set prefix filter."
          schema:
            type: "string"
            maxLength: 140
            example: "lucide"
        -
          name: "limit"
          in: "query"
          description: "Maximum number of icons to return."
          schema:
            type: "integer"
            minimum: 1
            maximum: 100
            default: 20
        -
          name: "offset"
          in: "query"
          description: "Zero-based result offset. Takes precedence over page."
          schema:
            type: "integer"
            minimum: 0
            default: 0
        -
          name: "page"
          in: "query"
          description: "One-based page number used when offset is omitted."
          schema:
            type: "integer"
            minimum: 1
            maximum: 10000
            default: 1
      responses:
        "200":
          description: "Icon search results."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/IconSearchResponse"
              examples:
                search:
                  value:
                    data:
                      -
                        id: 33716
                        name: "arrow-circle-up-fill"
                        slug: "arrow-circle-up-fill"
                        label: "Arrow Circle Up Fill"
                        description: null
                        category: "Interface"
                        width: 24
                        height: 24
                        viewBox: "0 0 24 24"
                        pageUrl: "https://svgicons.com/icon/33716/arrow-circle-up-fill"
                        svgUrl: "https://svgicons.com/img/33716/arrow-circle-up-fill.svg"
                        iconSet:
                          id: 10
                          name: "Pro REST Icons"
                          prefix: "pro-rest-icons"
                          description: "Example icon set used by Pro REST API tests."
                          total: 120
                          author: "Svg/icons"
                          authorUrl: null
                          license: "MIT"
                          licenseUrl: "https://opensource.org/licenses/MIT"
                          spdx: "MIT"
                          category: "Interface"
                          statusBadge: null
                          pageUrl: "https://svgicons.com/icon-set/pro-rest-icons"
                    meta:
                      query: "arrow"
                      category: null
                      iconSetPrefix: null
                      limit: 20
                      offset: 0
                      page: 1
                      nextOffset: 1
                      hasMore: false
        "401":
          "$ref": "#/components/responses/Unauthenticated"
        "403":
          "$ref": "#/components/responses/MissingScope"
        "422":
          "$ref": "#/components/responses/ValidationError"
      description: "Searches icon metadata for the authenticated Pro API token. Results include icon set, license, source URL, and SVG URL metadata, but not raw SVG markup."
  "/api/pro/icons/{icon}":
    get:
      tags:
        - "Icons"
      summary: "Get icon metadata"
      operationId: "getProIcon"
      security:
        -
          bearerAuth: []
      x-required-scopes:
        - "icons:read"
      parameters:
        -
          "$ref": "#/components/parameters/IconId"
      responses:
        "200":
          description: "Icon metadata without raw SVG body."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/IconResponse"
              examples:
                icon:
                  value:
                    data:
                      id: 33716
                      name: "arrow-circle-up-fill"
                      slug: "arrow-circle-up-fill"
                      label: "Arrow Circle Up Fill"
                      description: null
                      category: "Interface"
                      width: 24
                      height: 24
                      viewBox: "0 0 24 24"
                      pageUrl: "https://svgicons.com/icon/33716/arrow-circle-up-fill"
                      svgUrl: "https://svgicons.com/img/33716/arrow-circle-up-fill.svg"
                      iconSet:
                        id: 10
                        name: "Pro REST Icons"
                        prefix: "pro-rest-icons"
                        description: "Example icon set used by Pro REST API tests."
                        total: 120
                        author: "Svg/icons"
                        authorUrl: null
                        license: "MIT"
                        licenseUrl: "https://opensource.org/licenses/MIT"
                        spdx: "MIT"
                        category: "Interface"
                        statusBadge: null
                        pageUrl: "https://svgicons.com/icon-set/pro-rest-icons"
        "401":
          "$ref": "#/components/responses/Unauthenticated"
        "403":
          "$ref": "#/components/responses/MissingScope"
        "404":
          "$ref": "#/components/responses/NotFound"
      description: "Returns one icon's public metadata, including icon set, license, provenance URLs, dimensions, and public page/SVG URLs."
  "/api/pro/icons/{icon}/svg":
    get:
      tags:
        - "Icons"
      summary: "Get icon metadata and SVG payload"
      operationId: "getProIconSvg"
      security:
        -
          bearerAuth: []
      x-required-scopes:
        - "icons:read"
      parameters:
        -
          "$ref": "#/components/parameters/IconId"
      responses:
        "200":
          description: "Icon metadata with SVG source body and wrapped SVG document."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/IconSvgResponse"
              examples:
                svg:
                  value:
                    data:
                      id: 33716
                      name: "arrow-circle-up-fill"
                      slug: "arrow-circle-up-fill"
                      label: "Arrow Circle Up Fill"
                      description: null
                      category: "Interface"
                      width: 24
                      height: 24
                      viewBox: "0 0 24 24"
                      pageUrl: "https://svgicons.com/icon/33716/arrow-circle-up-fill"
                      svgUrl: "https://svgicons.com/img/33716/arrow-circle-up-fill.svg"
                      iconSet:
                        id: 10
                        name: "Pro REST Icons"
                        prefix: "pro-rest-icons"
                        description: "Example icon set used by Pro REST API tests."
                        total: 120
                        author: "Svg/icons"
                        authorUrl: null
                        license: "MIT"
                        licenseUrl: "https://opensource.org/licenses/MIT"
                        spdx: "MIT"
                        category: "Interface"
                        statusBadge: null
                        pageUrl: "https://svgicons.com/icon-set/pro-rest-icons"
                      body: "<path d=\"M12 4l7 7-1.4 1.4L13 7.8V20h-2V7.8l-4.6 4.6L5 11z\"/>"
                      svg: "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\"><path d=\"M12 4l7 7-1.4 1.4L13 7.8V20h-2V7.8l-4.6 4.6L5 11z\"/></svg>"
                      contentType: "image/svg+xml"
        "401":
          "$ref": "#/components/responses/Unauthenticated"
        "403":
          "$ref": "#/components/responses/MissingScope"
        "404":
          "$ref": "#/components/responses/NotFound"
      description: "Returns one icon's metadata plus the stored SVG body and a wrapped SVG document string."
  "/api/pro/icons/{icon}/png-export":
    post:
      tags:
        - "Icons"
      summary: "Export one icon as PNG or ZIP"
      operationId: "exportProIconPng"
      security:
        -
          bearerAuth: []
      x-required-scopes:
        - "icons:read"
        - "exports:create"
      parameters:
        -
          "$ref": "#/components/parameters/IconId"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              "$ref": "#/components/schemas/PngExportRequest"
            examples:
              png:
                value:
                  iconName: "arrow-circle-up-fill"
                  sizes:
                    - 512
                  densities:
                    - 1
                  backgroundType: "transparent"
                  iconColorMode: "preserve"
                  padding: 48
                  fit: "contain"
      responses:
        "200":
          description: "PNG bytes or ZIP bytes. The response Content-Type is image/png or application/zip."
          content:
            "image/png":
              schema:
                "$ref": "#/components/schemas/PngExportResponse"
            "application/zip":
              schema:
                "$ref": "#/components/schemas/PngExportResponse"
        "401":
          "$ref": "#/components/responses/Unauthenticated"
        "403":
          "$ref": "#/components/responses/MissingScope"
        "404":
          "$ref": "#/components/responses/NotFound"
        "422":
          "$ref": "#/components/responses/ValidationError"
      description: "Renders one icon to a binary PNG response or a ZIP when multiple sizes, densities, or zip output are requested."
  "/api/pro/project-kits":
    get:
      tags:
        - "Project Kits"
      summary: "List Icon Collections"
      operationId: "listProProjectKits"
      security:
        -
          bearerAuth: []
      x-required-scopes:
        - "collections:read"
      responses:
        "200":
          description: "Collection summaries and option values."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/ProjectKitListResponse"
              examples:
                projectKits:
                  value:
                    data:
                      -
                        id: 123
                        name: "Dashboard icons"
                        slug: "dashboard-icons"
                        description: "Icons used by the dashboard UI."
                        framework: "react-ts"
                        colorPolicy: "currentColor"
                        namingPolicy: "pascal"
                        iconsCount: 3
                        showUrl: "https://svgicons.com/project-kits/123"
                        updatedAt: "2026-05-10T12:00:00+00:00"
                        createdAt: "2026-05-10T11:45:00+00:00"
                    meta:
                      options:
                        frameworks:
                          - "svg"
                          - "react-ts"
                          - "vue"
                          - "sprite"
                        colorPolicies:
                          - "currentColor"
                          - "preserve"
                          - "strip"
                        namingPolicies:
                          - "kebab"
                          - "pascal"
                          - "camel"
        "401":
          "$ref": "#/components/responses/Unauthenticated"
        "403":
          "$ref": "#/components/responses/MissingScope"
      description: "Lists the authenticated user's Icon Collections. The live REST route keeps the historical project-kits path segment."
    post:
      tags:
        - "Project Kits"
      summary: "Create an Icon Collection"
      operationId: "createProProjectKit"
      security:
        -
          bearerAuth: []
      x-required-scopes:
        - "collections:write"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              "$ref": "#/components/schemas/ProjectKitWriteRequest"
            examples:
              createProjectKit:
                value:
                  name: "Dashboard icons"
                  description: "Icons used by the dashboard UI."
                  framework: "react-ts"
                  colorPolicy: "currentColor"
                  namingPolicy: "pascal"
      responses:
        "201":
          description: "Created collection summary."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/ProjectKitSummaryResponse"
              examples:
                projectKit:
                  value:
                    data:
                      id: 123
                      name: "Dashboard icons"
                      slug: "dashboard-icons"
                      description: "Icons used by the dashboard UI."
                      framework: "react-ts"
                      colorPolicy: "currentColor"
                      namingPolicy: "pascal"
                      iconsCount: 3
                      showUrl: "https://svgicons.com/project-kits/123"
                      updatedAt: "2026-05-10T12:00:00+00:00"
                      createdAt: "2026-05-10T11:45:00+00:00"
        "401":
          "$ref": "#/components/responses/Unauthenticated"
        "403":
          "$ref": "#/components/responses/MissingScope"
        "422":
          "$ref": "#/components/responses/ValidationError"
      description: "Creates an Icon Collection for the authenticated user."
  "/api/pro/project-kits/{projectKit}":
    get:
      tags:
        - "Project Kits"
      summary: "Get one Icon Collection"
      operationId: "getProProjectKit"
      security:
        -
          bearerAuth: []
      x-required-scopes:
        - "collections:read"
      parameters:
        -
          "$ref": "#/components/parameters/ProjectKitId"
        -
          name: "per_page"
          in: "query"
          schema:
            type: "integer"
            minimum: 1
            maximum: 100
            default: 100
      responses:
        "200":
          description: "Collection detail and paginated icons."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/ProjectKitDetailResponse"
              examples:
                projectKit:
                  value:
                    data:
                      id: 123
                      name: "Dashboard icons"
                      slug: "dashboard-icons"
                      description: "Icons used by the dashboard UI."
                      framework: "react-ts"
                      colorPolicy: "currentColor"
                      namingPolicy: "pascal"
                      iconsCount: 3
                      showUrl: "https://svgicons.com/project-kits/123"
                      updatedAt: "2026-05-10T12:00:00+00:00"
                      createdAt: "2026-05-10T11:45:00+00:00"
                      licenseSummary:
                        -
                          license: "MIT"
                          count: 3
                          sets:
                            -
                              name: "Pro REST Icons"
                              prefix: "pro-rest-icons"
                              licenseUrl: "https://opensource.org/licenses/MIT"
                      iconSetSummary:
                        -
                          name: "Pro REST Icons"
                          prefix: "pro-rest-icons"
                          count: 3
                    icons:
                      data:
                        -
                          id: 33716
                          icon_set_id: 10
                          name: "arrow-circle-up-fill"
                          width: 24
                          height: 24
                          body: "<path d=\"M12 4l7 7-1.4 1.4L13 7.8V20h-2V7.8l-4.6 4.6L5 11z\"/>"
                          iconSet:
                            id: 10
                            name: "Pro REST Icons"
                            prefix: "pro-rest-icons"
                            license: "MIT"
                            licenseUrl: "https://opensource.org/licenses/MIT"
                      current_page: 1
                      first_page_url: "https://svgicons.com/api/pro/project-kits/123?page=1"
                      from: 1
                      last_page: 1
                      last_page_url: "https://svgicons.com/api/pro/project-kits/123?page=1"
                      links:
                        -
                          url: null
                          label: "&laquo; Previous"
                          active: false
                        -
                          url: "https://svgicons.com/api/pro/project-kits/123?page=1"
                          label: "1"
                          active: true
                        -
                          url: null
                          label: "Next &raquo;"
                          active: false
                      next_page_url: null
                      path: "https://svgicons.com/api/pro/project-kits/123"
                      per_page: 100
                      prev_page_url: null
                      to: 1
                      total: 1
        "401":
          "$ref": "#/components/responses/Unauthenticated"
        "403":
          "$ref": "#/components/responses/MissingScope"
        "404":
          "$ref": "#/components/responses/NotFound"
      description: "Returns one Icon Collection, license and icon-set summaries, and a paginated list of icons in the collection."
    patch:
      tags:
        - "Project Kits"
      summary: "Update one Icon Collection"
      operationId: "updateProProjectKit"
      security:
        -
          bearerAuth: []
      x-required-scopes:
        - "collections:write"
      parameters:
        -
          "$ref": "#/components/parameters/ProjectKitId"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              "$ref": "#/components/schemas/ProjectKitWriteRequest"
            examples:
              updateProjectKit:
                value:
                  name: "Dashboard icons"
                  colorPolicy: "currentColor"
                  namingPolicy: "pascal"
      responses:
        "200":
          description: "Updated collection summary."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/ProjectKitSummaryResponse"
              examples:
                projectKit:
                  value:
                    data:
                      id: 123
                      name: "Dashboard icons"
                      slug: "dashboard-icons"
                      description: "Icons used by the dashboard UI."
                      framework: "react-ts"
                      colorPolicy: "currentColor"
                      namingPolicy: "pascal"
                      iconsCount: 3
                      showUrl: "https://svgicons.com/project-kits/123"
                      updatedAt: "2026-05-10T12:00:00+00:00"
                      createdAt: "2026-05-10T11:45:00+00:00"
        "401":
          "$ref": "#/components/responses/Unauthenticated"
        "403":
          "$ref": "#/components/responses/MissingScope"
        "404":
          "$ref": "#/components/responses/NotFound"
        "422":
          "$ref": "#/components/responses/ValidationError"
      description: "Updates an Icon Collection's name, description, framework, color policy, or naming policy."
    delete:
      tags:
        - "Project Kits"
      summary: "Delete one Icon Collection"
      operationId: "deleteProProjectKit"
      security:
        -
          bearerAuth: []
      x-required-scopes:
        - "collections:write"
      parameters:
        -
          "$ref": "#/components/parameters/ProjectKitId"
      responses:
        "204":
          description: "Deleted."
        "401":
          "$ref": "#/components/responses/Unauthenticated"
        "403":
          "$ref": "#/components/responses/MissingScope"
        "404":
          "$ref": "#/components/responses/NotFound"
      description: "Deletes an Icon Collection and its related collection export artifacts."
  "/api/pro/project-kits/{projectKit}/icons":
    post:
      tags:
        - "Project Kits"
      summary: "Add one icon to an Icon Collection"
      operationId: "addProProjectKitIcon"
      security:
        -
          bearerAuth: []
      x-required-scopes:
        - "collections:write"
      parameters:
        -
          "$ref": "#/components/parameters/ProjectKitId"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              "$ref": "#/components/schemas/AddIconRequest"
            examples:
              addIcon:
                value:
                  icon_id: 33716
      responses:
        "200":
          description: "Icon already existed in the collection."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/AddIconResponse"
        "201":
          description: "Icon added to the collection."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/AddIconResponse"
        "401":
          "$ref": "#/components/responses/Unauthenticated"
        "403":
          "$ref": "#/components/responses/MissingScope"
        "404":
          "$ref": "#/components/responses/NotFound"
        "422":
          "$ref": "#/components/responses/ValidationError"
      description: "Adds one icon to an Icon Collection by icon id. The response tells whether a new collection entry was created."
  "/api/pro/project-kits/{projectKit}/icons/bulk":
    post:
      tags:
        - "Project Kits"
      summary: "Add multiple icons to an Icon Collection"
      operationId: "bulkAddProProjectKitIcons"
      security:
        -
          bearerAuth: []
      x-required-scopes:
        - "collections:write"
      parameters:
        -
          "$ref": "#/components/parameters/ProjectKitId"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              "$ref": "#/components/schemas/BulkAddIconsRequest"
            examples:
              bulkAddIcons:
                value:
                  icon_ids:
                    - 33716
                    - 33717
                    - 33718
      responses:
        "200":
          description: "All submitted icons already existed in the collection."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/BulkAddIconsResponse"
        "201":
          description: "At least one icon was added."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/BulkAddIconsResponse"
        "401":
          "$ref": "#/components/responses/Unauthenticated"
        "403":
          "$ref": "#/components/responses/MissingScope"
        "404":
          "$ref": "#/components/responses/NotFound"
        "422":
          "$ref": "#/components/responses/ValidationError"
      description: "Adds up to 500 icon ids to an Icon Collection and reports which ids were created or already present."
  "/api/pro/project-kits/{projectKit}/icons/{icon}":
    delete:
      tags:
        - "Project Kits"
      summary: "Remove one icon from an Icon Collection"
      operationId: "removeProProjectKitIcon"
      security:
        -
          bearerAuth: []
      x-required-scopes:
        - "collections:write"
      parameters:
        -
          "$ref": "#/components/parameters/ProjectKitId"
        -
          "$ref": "#/components/parameters/IconId"
      responses:
        "200":
          description: "Removal result and updated collection summary."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/RemoveIconResponse"
        "401":
          "$ref": "#/components/responses/Unauthenticated"
        "403":
          "$ref": "#/components/responses/MissingScope"
        "404":
          "$ref": "#/components/responses/NotFound"
      description: "Removes one icon from an Icon Collection by icon id."
  "/api/pro/project-kits/{projectKit}/exports":
    post:
      tags:
        - "Exports"
      summary: "Queue an Icon Collection export"
      operationId: "createProProjectKitExport"
      security:
        -
          bearerAuth: []
      x-required-scopes:
        - "exports:create"
      parameters:
        -
          "$ref": "#/components/parameters/ProjectKitId"
      requestBody:
        required: false
        content:
          "application/json":
            schema:
              "$ref": "#/components/schemas/CreateExportRequest"
            examples:
              createExport:
                value:
                  formats:
                    - "react-ts"
                    - "vue"
                    - "license-manifest"
                  options:
                    colorPolicy: "currentColor"
                    namingPolicy: "pascal"
                    typescript: true
                    defaultSize: 24
      responses:
        "202":
          description: "Export queued."
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/ExportResponse"
              examples:
                export:
                  value:
                    data:
                      id: 456
                      status: "queued"
                      formats:
                        - "svg-folder"
                        - "svg-sprite"
