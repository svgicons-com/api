                  - "search:read"
                missingScope: "search:read"
            proRequired:
              value:
                message: "This endpoint requires the Pro Plan."
                requiredScopes:
                  - "collections:read"
                pricingUrl: "https://svgicons.com/pricing"
    ValidationError:
      description: "Request validation failed."
      content:
        "application/json":
          schema:
            "$ref": "#/components/schemas/ValidationError"
    NotFound:
      description: "Resource was not found or is not owned by the token user."
      content:
        "application/json":
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              value:
                message: "Not Found"
    Conflict:
